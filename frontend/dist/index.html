<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>mestt-record</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <section class="card">
        <p class="eyebrow">mestt</p>
        <h1 id="status">Press Enter to record</h1>
        <p id="detail" class="detail">Wails GUI scaffold is ready. Recorder wiring is next.</p>
        <div class="meter" aria-hidden="true">
          <div id="meter-fill" class="meter-fill"></div>
        </div>
        <div class="actions">
          <button id="primary" type="button">Record</button>
          <button id="secondary" type="button" class="secondary">Close</button>
        </div>
      </section>
    </main>
    <script src="./main.js"></script>
  </body>
</html>
